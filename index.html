<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 9</title>

    <style>
      button {
        margin: 3px;
      }

      button:hover {
        cursor: pointer;
      }

      #first-num,
      #second-num {
        width: 60px;
      }

      output {
        border: 1px solid gray;
        display: block;
        height: 18px;
        margin-top: 5px;
        padding: 5px;
        width: 240px;
      }

      main {
        width: 800px;
      }

      #error-btns {
        column-gap: 5px;
        display: flex;
        flex-wrap: wrap;
        margin-top: 30px;
        row-gap: 5px;
      }

      #error-btns > * {
        padding: 8px 2px;
        width: 122px;
      }
    </style>
  </head>

  <body>
    <main>
      <form>
        <fieldset>
          <legend>Error Calculator</legend>
          <input name="first-num" id="first-num" />
          <select name="operator" id="operator">
            <option>+</option>
            <option>-</option>
            <option>*</option>
            <option>/</option>
          </select>
          <input name="second-num" id="second-num" />
          <button id="calculate">Calculate</button>
          <br />
          <output></output>
        </fieldset>
      </form>

      <section id="error-btns">
        <button data-action="log">Console Log</button>
        <button data-action="error">Console Error</button>
        <button data-action="count">Console Count</button>
        <button data-action="warn">Console Warn</button>
        <button data-action="assert">Console Assert</button>
        <button data-action="clear">Console Clear</button>
        <button data-action="dir">Console Dir</button>
        <button data-action="dirxml">Console dirxml</button>
        <button data-action="groupStart">Console Group Start</button>
        <button data-action="groupEnd">Console Group End</button>
        <button data-action="table">Console Table</button>
        <button data-action="startTimer">Start Timer</button>
        <button data-action="endTimer">End Timer</button>
        <button data-action="trace">Console Trace</button>
        <button data-action="globalError">Trigger a Global Error</button>
      </section>
    </main>

    <script>
      let form = document.querySelector("form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        try {
          let output = document.querySelector("output");

          if (!output) {
            throw new Error("Output element missing");
          }

          let firstNum = document.querySelector("#first-num").value;
          let secondNum = document.querySelector("#second-num").value;
          let operator = document.querySelector("#operator").value;

          if (firstNum == "" || secondNum == "") {
            throw new Error("Enter two numbers");
          }

          output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
        } catch (err) {
          console.error(`${err.name}: ${err.message}`);
          if (output) {
            output.innerHTML = `Error: ${err.message}`;
          }
        } finally {
          console.log("Finished");
        }
      });

      let errorBtns = Array.from(
        document.querySelectorAll("#error-btns > button"),
      );

      // Start your code here
      // You may move this JS to another file if you wish
      const user = {
        name: "Jordan",
        occupation: "Student",
        age: "20",
        gender: "male",
      };

      const table = [
        { id: 1, fruit: "Apple", price: 1 },
        { id: 2, fruit: "Banana", price: 2 },
        { id: 3, fruit: "Watermelon", price: 3 },
      ];

      const actions = {
        log() {
          console.log("Console Log Demo:", user);
        },
        error() {
          console.error("Console Error Demo");
        },
        count() {
          console.count("Console Count Demo");
        },
        warn() {
          console.warn("Console Warn Demo");
        },
        assert() {
          console.assert(1 === 2, "Console Assert Demo");
        },
        clear() {
          console.clear();
        },
        dir() {
          console.dir(document.querySelector("#operator"));
        },
        dirxml() {
          console.dirxml(document.querySelector("main"));
        },
        groupStart() {
          console.group("Console Group Demo");
          console.log("Inside Group 1");
          console.log("Inside Group 2");
        },
        groupEnd() {
          console.log("Still Inside Group");
          console.groupEnd();
          console.log("Outside Group");
        },
        table() {
          console.table(table);
        },
        startTimer() {
          console.time("Console Timer Demo");
        },
        endTimer() {
          console.timeEnd("Console Timer Demo");
        },
        trace() {
          function outer() {
            inner();
          }
          function inner() {
            console.trace("Console Trace Demo");
          }
          outer();
        },
      };

      errorBtns.forEach((btn) => {
        const action = actions[btn.dataset.action];
        if (action) {
          btn.addEventListener("click", action);
        }
      });
    </script>
  </body>
</html>
